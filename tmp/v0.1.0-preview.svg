<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" preserveAspectRatio="xMidYMid meet" font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="bar0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="50%" stop-color="rgb(255,80,160)"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="50%" stop-color="rgb(80,200,255)"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="50%" stop-color="rgb(160,255,80)"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="50%" stop-color="rgb(255,200,80)"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.75"/>
    </radialGradient>
    <pattern id="scanlines" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="rgba(255,255,255,0.025)"/>
    </pattern>
  </defs>

  <!-- CRT chassis -->
  <rect width="640" height="360" fill="#0a0a14"/>
  <rect width="640" height="360" fill="url(#scanlines)"/>

  <!-- raster bars (sinusoidal color beams) -->
  <rect x="0" y="60"  width="640" height="22" fill="url(#bar3)" opacity="0.85"/>
  <rect x="0" y="120" width="640" height="28" fill="url(#bar0)" opacity="0.9"/>
  <rect x="0" y="184" width="640" height="20" fill="url(#bar1)" opacity="0.85"/>
  <rect x="0" y="232" width="640" height="16" fill="url(#bar2)" opacity="0.85"/>
  <rect x="0" y="278" width="640" height="14" fill="url(#bar3)" opacity="0.7"/>

  <!-- pixel fire at bottom (a sparse dot pattern mimicking the doom-fire demo effect) -->
  <g fill="#bf4707">
    <rect x="320" y="318" width="2" height="2"/>
    <rect x="322" y="320" width="2" height="2"/>
    <rect x="318" y="320" width="2" height="2"/>
    <rect x="324" y="322" width="2" height="2"/>
    <rect x="316" y="322" width="2" height="2"/>
    <rect x="320" y="324" width="2" height="2"/>
  </g>
  <g fill="#df5708">
    <rect x="320" y="320" width="2" height="2"/>
    <rect x="318" y="322" width="2" height="2"/>
    <rect x="322" y="322" width="2" height="2"/>
  </g>
  <g fill="#df8708">
    <rect x="320" y="322" width="2" height="2"/>
    <rect x="318" y="324" width="2" height="2"/>
    <rect x="322" y="324" width="2" height="2"/>
  </g>
  <g fill="#dfbf0a">
    <rect x="320" y="324" width="2" height="2"/>
    <rect x="319" y="326" width="2" height="2"/>
  </g>
  <g fill="#ffffff">
    <rect x="320" y="326" width="2" height="1"/>
  </g>

  <!-- wireframe vector cube (rotated axonometric with pyramid apex) -->
  <g stroke="#4ef2d2" stroke-width="1.4" fill="none" stroke-linejoin="miter" stroke-linecap="square">
    <polygon points="220,140 320,140 320,240 220,240"/>
    <polygon points="280,170 380,170 380,270 280,270"/>
    <line x1="220" y1="140" x2="280" y2="170"/>
    <line x1="320" y1="140" x2="380" y2="170"/>
    <line x1="320" y1="240" x2="380" y2="270"/>
    <line x1="220" y1="240" x2="280" y2="270"/>
    <polygon points="300,108 220,140 280,170 380,170 320,140"/>
    <line x1="300" y1="108" x2="280" y2="270"/>
    <line x1="300" y1="108" x2="380" y2="270"/>
    <polygon points="300,302 220,240 280,270 380,270 320,240"/>
    <line x1="300" y1="302" x2="280" y2="170"/>
    <line x1="300" y1="302" x2="380" y2="170"/>
  </g>
  <g fill="#ffffff">
    <rect x="219" y="139" width="4" height="4"/>
    <rect x="319" y="139" width="4" height="4"/>
    <rect x="219" y="239" width="4" height="4"/>
    <rect x="319" y="239" width="4" height="4"/>
    <rect x="279" y="169" width="4" height="4"/>
    <rect x="379" y="169" width="4" height="4"/>
    <rect x="279" y="269" width="4" height="4"/>
    <rect x="379" y="269" width="4" height="4"/>
    <rect x="299" y="107" width="4" height="4"/>
    <rect x="299" y="301" width="4" height="4"/>
  </g>

  <!-- starfield -->
  <g fill="#ffffff">
    <rect x="42" y="32" width="1" height="1"/>
    <rect x="78" y="48" width="2" height="2"/>
    <rect x="120" y="22" width="1" height="1"/>
    <rect x="200" y="50" width="1" height="1"/>
    <rect x="510" y="36" width="2" height="2"/>
    <rect x="568" y="22" width="1" height="1"/>
    <rect x="600" y="64" width="1" height="1"/>
  </g>
  <g fill="#aaaaaa">
    <rect x="62" y="20" width="1" height="1"/>
    <rect x="170" y="36" width="1" height="1"/>
    <rect x="540" y="50" width="1" height="1"/>
    <rect x="612" y="14" width="1" height="1"/>
  </g>
  <g fill="#666666">
    <rect x="98" y="60" width="1" height="1"/>
    <rect x="448" y="14" width="1" height="1"/>
    <rect x="592" y="44" width="1" height="1"/>
  </g>

  <!-- sine-scroller text at bottom (curves via path) -->
  <path id="scrollpath" d="M 30 350 q 25 -22 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0 t 50 0" fill="none"/>
  <text font-size="14" font-weight="bold" fill="#ffdd55">
    <textPath href="#scrollpath" startOffset="0%">
      *** DEMOSCENE SIMULATOR v0.1.0 *** 1985–2005 *** SOFTWARE 4 LIFE *** GREETZ: FUTURE CREW · FARBRAUSCH · BLACK LOTUS · KEFRENS · TRSI · MAJIC 12 · RAZOR 1911 · ASD · ENJOY THE SCENE!
    </textPath>
  </text>

  <!-- HUD overlays -->
  <g font-size="10" fill="rgba(0,255,100,0.85)">
    <text x="6" y="14">FPS: 60  EFF: 7  MONITOR ID: S-CRT-CRT</text>
    <text x="490" y="14">PROD: CRACKTRO (TIMO)</text>
  </g>
  <g font-size="8" fill="rgba(255,255,255,0.55)">
    <text x="6" y="354">EVENT SRC: APPEND-ONLY  </text>
    <text x="540" y="354">Y1988 M11</text>
  </g>

  <!-- CRT vignette overlay -->
  <rect width="640" height="360" fill="url(#vignette)" pointer-events="none"/>
  <rect x="2" y="2" width="636" height="356" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
</svg>
